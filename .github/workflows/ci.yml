name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: ruff
        run: ruff check src tests
      - name: pytest
        run: pytest tests/ -ra

  security:
    name: security (bandit + pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install biobabel + audit tools
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pip-audit
      - name: bandit (static analysis for common Python pitfalls)
        run: |
          bandit -r src/biobabel \
            -ll \
            -x src/biobabel/_runtime/sandbox.py,src/biobabel/_runtime/policy.py,src/biobabel/_retrofit/retrofit.py
        # ↑ The sandbox/policy/retrofit modules legitimately wrap subprocess +
        # parse user code; bandit flags them with predictable false positives.
      - name: pip-audit (CVEs in dependencies)
        run: pip-audit --strict
      - name: security-property tests
        run: pytest tests/test_security.py tests/test_policy.py tests/test_sandbox.py -v

  index-and-validate:
    name: index + validate rgrid contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install biobabel
        run: pip install -e .
      - name: Install rgrid-python (Class B canonical contract)
        run: |
          # In CI, rgrid-python is fetched as a sibling repo via a manual
          # checkout step or git submodule. For now, this job is gated on the
          # presence of a sibling rgrid-python checkout; uncomment when wired:
          # pip install rgrid-python
          echo "rgrid-python contract validation skipped until packaged for CI"
      - name: biobabel index
        run: biobabel index || true   # tolerates empty registry
      - name: biobabel doctor
        run: biobabel doctor || true

# Nightly drift-watch job will live in a separate workflow once
# `biobabel index --check-upstream-head` ships. See final_plan.md §18.2.
